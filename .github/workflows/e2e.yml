# 모든 API/Firebase 요청은 page.route()로 mock 처리 — 외부 서버 연동 불필요
name: E2E Tests

on:
  pull_request:
    branches: [main, dev]

jobs:
  e2e:
    name: Playwright E2E
    timeout-minutes: 60
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write   # PR 코멘트 작성에 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --reporter=json,html
        continue-on-error: true   # 테스트 실패해도 코멘트는 남김
        env:
          CI: true

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Post PR comment with test results
        uses: daun/playwright-report-summary@v3
        if: always()
        with:
          report-file: results.json
          comment-title: '🔎 E2E 테스트 결과'
          job-summary: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
